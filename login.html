<!DOCTYPE html>
<html>

<head>
    <title>Login</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #87CEFA, #FFE4B5);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            width: 350px;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .login-box h2 {
            color: #333;
            margin-bottom: 20px;
        }

        input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid gray;
            border-radius: 8px;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #007BFF;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        a {
            text-decoration: none;
            color: blue;
        }

        p {
            margin-top: 15px;
        }
    </style>
</head>

<body>

    <div class="login-box">
        <h2>Welcome Back!</h2>

        <form action="search.html">
            <input type="email" placeholder="Enter Email" required>

            <input type="password" placeholder="Enter Password" required>

            <button type="submit">Login</button>
        </form>

        <p>Don't have an account?
            <a href="practice.html">Go to Home</a>
        </p>
    </div>

</body>

</html>
